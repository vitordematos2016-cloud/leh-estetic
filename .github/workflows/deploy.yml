name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check secret - FTP_SERVER
        run: '[ -n "${{ secrets.FTP_SERVER }}" ]'

      - name: Check secret - FTP_USERNAME
        run: '[ -n "${{ secrets.FTP_USERNAME }}" ]'

      - name: Check secret - FTP_PASSWORD
        run: '[ -n "${{ secrets.FTP_PASSWORD }}" ]'

      - name: Check secret - FTP_SERVER_DIR
        run: '[ -n "${{ secrets.FTP_SERVER_DIR }}" ]'

      - name: Deploy dist/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || '21' }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: dist/
