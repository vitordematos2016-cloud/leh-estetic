name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check required secrets are set
        run: |
          missing=""
          [ -z "${{ secrets.FTP_SERVER }}" ] && missing="$missing FTP_SERVER"
          [ -z "${{ secrets.FTP_USERNAME }}" ] && missing="$missing FTP_USERNAME"
          [ -z "${{ secrets.FTP_PASSWORD }}" ] && missing="$missing FTP_PASSWORD"
          [ -z "${{ secrets.FTP_SERVER_DIR }}" ] && missing="$missing FTP_SERVER_DIR"
          if [ -n "$missing" ]; then
            echo "::error::Missing repository secrets:$missing — add them under Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "All required FTP secrets are present."

      - name: Deploy dist/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || '21' }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: dist/
